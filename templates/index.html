<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Record Lookup</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .card {
        background: white;
        padding: 40px;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: 420px;
        text-align: center;
      }

      h1 {
        margin-bottom: 25px;
      }

      input {
        width: 70%;
        padding: 12px;
        font-size: 16px;
        border: 1px solid #ccc;
        border-radius: 8px;
        margin-right: 10px;
      }

      button {
        padding: 12px 16px;
        font-size: 16px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      button:hover {
        background: #3730a3;
      }

      .result {
        margin-top: 25px;
        font-size: 18px;
        font-weight: bold;
        color: #111827;
      }

      .hint {
        margin-top: 15px;
        color: #6b7280;
        font-size: 14px;
      }
    </style>
  </head>

  <body>

    <div class="card">
      <h1>Record Lookup</h1>

      <form method="POST" action="/lookup">
        <input 
          name="answer"
          placeholder="Try: dog, tree, car, pizza..."
          value="{{ user_text }}"
        />
        <button type="submit">Search</button>
      </form>

      <div class="hint">
        Search any keyword from the dataset
      </div>

      {% if result %}
        <div class="result">
          {{ result }}
        </div>
      {% endif %}
    </div>

  </body>
</html>
