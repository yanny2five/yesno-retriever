<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Record Lookup</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4f46e5, #06b6d4);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        background: white;
        padding: 28px;
        border-radius: 14px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        width: min(760px, 100%);
      }

      h1 {
        margin: 0 0 16px 0;
        text-align: center;
      }

      .form-row {
        display: flex;
        gap: 10px;
        justify-content: center;
        align-items: center;
        flex-wrap: wrap;
      }

      input {
        flex: 1;
        min-width: 260px;
        padding: 12px;
        font-size: 16px;
        border: 1px solid #cbd5e1;
        border-radius: 10px;
        outline: none;
      }

      button {
        padding: 12px 16px;
        font-size: 16px;
        background: #4f46e5;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      button:hover {
        background: #3730a3;
      }

      .chips {
        margin-top: 16px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .chip {
        border: 1px solid #cbd5e1;
        background: #f8fafc;
        padding: 8px 10px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 14px;
        user-select: none;
      }

      .chip:hover {
        background: #eef2ff;
        border-color: #818cf8;
      }

      .hint {
        margin-top: 12px;
        color: #64748b;
        font-size: 14px;
        text-align: center;
      }

      .result {
        margin-top: 18px;
        padding: 14px;
        border-radius: 12px;
        background: #0b1220;
        color: #e5e7eb;
        font-family: Consolas, Monaco, monospace;
        white-space: pre-wrap;
      }

      .footer-row {
        margin-top: 12px;
        display: flex;
        justify-content: center;
      }

      .small-btn {
        background: #111827;
      }
      .small-btn:hover {
        background: #0b1220;
      }
    </style>
  </head>

  <body>
    <div class="card">
      <h1>Record Lookup</h1>

      <form id="lookupForm" method="POST" action="/lookup">
        <div class="form-row">
          <input
            id="answerInput"
            name="answer"
            placeholder="Type a keyword or click one below…"
            value="{{ user_text }}"
            autocomplete="off"
          />
          <button type="submit">Search</button>
        </div>

        <div class="footer-row">
          <button class="small-btn" type="button" id="clearBtn">Clear</button>
        </div>
      </form>

      <hr style="margin:18px 0">

      <h3 style="text-align:center;margin:0 0 8px 0">Load CSV</h3>
      <form id="uploadForm" method="POST" action="/upload" enctype="multipart/form-data">
        <div class="form-row">
          <input type="file" name="csvfile" accept="text/csv" />
          <button type="submit">Upload CSV</button>
        </div>
      </form>

      {% if message %}
        <div class="hint" style="color:#0b1220;background:#f1f5f9;padding:10px;border-radius:8px;margin-top:12px">{{ message }}</div>
      {% endif %}

      <div id="uploadStatus" class="hint" style="display:none;margin-top:12px;text-align:center"></div>

      <div class="hint">
        Click a keyword chip to auto-fill and search.
      </div>

      <div class="chips" id="chips">
        {% for k in keywords[:20] %}
          <div class="chip" data-key="{{ k }}">{{ k }}</div>
        {% endfor %}
        {% if keywords|length > 20 %}
          <div class="chip" style="cursor:default;background:#e5e7eb;border-color:#d1d5db" title="{{ keywords|length }} total keywords">...</div>
        {% endif %}
      </div>

      {% if result %}
        <div class="result">{{ result }}</div>
      {% endif %}
    </div>

    <script>
      const input = document.getElementById("answerInput");
      const form = document.getElementById("lookupForm");

      // Clickable chips: fill + auto-submit
      document.getElementById("chips").addEventListener("click", (e) => {
        const chip = e.target.closest(".chip");
        if (!chip) return;
        input.value = chip.dataset.key;
        form.submit();
      });

      // Clear input
      document.getElementById("clearBtn").addEventListener("click", () => {
        input.value = "";
        input.focus();
      });

      // AJAX upload: intercept upload form and update chips dynamically
      const uploadForm = document.getElementById('uploadForm');
      const uploadStatus = document.getElementById('uploadStatus');
      uploadForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        uploadStatus.style.display = 'none';
        const fd = new FormData(uploadForm);
        try {
          const resp = await fetch(uploadForm.action, {
            method: 'POST',
            body: fd,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
          });
          const data = await resp.json();
          if (!resp.ok || data.status !== 'ok') {
            uploadStatus.textContent = data.message || 'Upload failed';
            uploadStatus.style.color = '#b91c1c';
            uploadStatus.style.display = '';
            return;
          }
          // success: rebuild chips
          const chips = document.getElementById('chips');
          chips.innerHTML = '';
          (data.keywords || []).forEach(k => {
            const d = document.createElement('div');
            d.className = 'chip';
            d.dataset.key = k;
            d.textContent = k;
            chips.appendChild(d);
          });
          // Add ellipsis if there are more than 20 keywords
          if (data.total_keywords && data.total_keywords > 20) {
            const ellipsis = document.createElement('div');
            ellipsis.className = 'chip';
            ellipsis.textContent = '...';
            ellipsis.style.cursor = 'default';
            ellipsis.style.background = '#e5e7eb';
            ellipsis.style.borderColor = '#d1d5db';
            ellipsis.title = data.total_keywords + ' total keywords';
            chips.appendChild(ellipsis);
          }
          });
          uploadStatus.textContent = data.message || 'Updated';
          uploadStatus.style.color = '#064e3b';
          uploadStatus.style.display = '';
        } catch (err) {
          uploadStatus.textContent = 'Upload failed: ' + err;
          uploadStatus.style.color = '#b91c1c';
          uploadStatus.style.display = '';
        }
      });
    </script>
  </body>
</html>
